        '429':
          description: Too many requests. Rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds until the rate limit is reset
              schema:
                type: integer
                format: int32
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                rate_limit_exceeded:
                  value:
                    errorCode: "orders:get_rate_limit_exceeded"
                    message: "Rate limit exceeded"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 429
        '500':
          description: Internal server error. Please try again later.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                server_error:
                  value:
                    errorCode: "orders:get_server_error"
                    message: "Internal server error. Please try again later"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 500
    put:
      summary: Update a specific order
      description: Update details of a specific order by ID
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
            examples:
              updated_order:
                value:
                  products:
                    - name: "Product B"
                      price: 15.99
                      status: "available"
                      remarks: "Great product"
                  user: "user456"
      responses:
        '200':
          description: The updated order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              examples:
                updated_order:
                  value:
                    orderId: "123e4567-e89b-12d3-a456-426614174000"
                    version: 2
                    createdAt: "2024-04-20T12:00:00Z"
                    updatedAt: "2024-04-20T12:35:00Z"
                    products:
                      - name: "Product B"
                        updatedAt: "2024-04-20T12:35:00Z"
                        price: 15.99
                        status: "available"
                        remarks: "Great product"
                    user: "user456"
                    totalAmount: 15.99
                    status: "OrderPending"
                    updates: []
        '400':
          description: Bad request. Invalid order ID or input data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                invalid_input:
                  value:
                    errorCode: "orders:update_invalid_input"
                    message: "Invalid order ID or input data"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
