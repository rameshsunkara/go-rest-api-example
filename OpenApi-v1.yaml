openapi: 3.1.0
info:
  title: Orders API
  description: API for managing orders in an e-commerce system
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
    description: Sample production server
security:
  - apiKey: [] # Example of API key authentication, replace with appropriate security scheme
tags:
  - name: Orders
    description: Operations related to orders
paths:
  /orders:
    get:
      summary: Retrieve orders with pagination
      description: Retrieve a list of orders in the system with pagination support
      tags:
        - Orders
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
          description: Number of items to skip
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Maximum number of items to return
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
              examples:
                orders:
                  value:
                    - orderId: "123e4567-e89b-12d3-a456-426614174000"
                      version: 1
                      createdAt: "2024-04-20T12:00:00Z"
                      updatedAt: "2024-04-20T12:30:00Z"
                      products:
                        - name: "Product A"
                          updatedAt: "2024-04-20T12:05:00Z"
                          price: 10.99
                          status: "available"
                          remarks: "Good product"
                      user: "user123"
                      totalAmount: 10.99
                      status: "OrderPending"
                      updates: []
        '400':
          description: Bad request. Invalid offset or limit value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                invalid_params:
                  value:
                    errorCode: "orders:get_invalid_params"
                    message: "Invalid offset or limit value"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 400
        '401':
          description: Unauthorized. Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                unauthorized:
                  value:
                    errorCode: "orders:get_unauthorized"
                    message: "Authentication required"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 401
        '404':
          description: Not found. No orders found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                not_found:
                  value:
                    errorCode: "orders:get_not_found"
                    message: "No orders found"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 404
        '429':
          description: Too many requests. Rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds until the rate limit is reset
              schema:
                type: integer
                format: int32
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                rate_limit_exceeded:
                  value:
                    errorCode: "orders:get_rate_limit_exceeded"
                    message: "Rate limit exceeded"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 429
        '500':
          description: Internal server error. Please try again later.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                server_error:
                  value:
                    errorCode: "orders:get_server_error"
                    message: "Internal server error. Please try again later"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 500
    post:
      summary: Create a new order
      description: Create a new order in the system
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
            examples:
              new_order:
                value:
                  products:
                    - name: "Product A"
                      price: 10.99
                      quantity: 2
                    - name: "Product B"
                      price: 11.99
                      quantity: 1
      responses:
        '201':
          description: The created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              examples:
                created_order:
                  value:
                    orderId: "123e4567-e89b-12d3-a456-426614174000"
                    version: 1
                    createdAt: "2024-04-20T12:00:00Z"
                    updatedAt: "2024-04-20T12:00:00Z"
                    products:
                      - name: "Product A"
                        updatedAt: "2024-04-20T12:00:00Z"
                        price: 10.99
                        quantity: 2
                      - name: "Product B"
                        updatedAt: "2024-04-20T12:00:00Z"
                        price: 11.99
                        quantity: 1
                    user: "user123@gmail.com"
                    totalAmount: 33.97
                    status: "OrderPending"
                    updates: []
        '400':
          description: Bad request. Invalid order input data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                invalid_input:
                  value:
                    errorCode: "orders:create_invalid_input"
                    message: "Invalid order input data"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 400
        '401':
          description: Unauthorized. Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                unauthorized:
                  value:
                    errorCode: "orders:create_unauthorized"
                    message: "Authentication required"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 401
        '429':
          description: Too many requests. Rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds until the rate limit is reset
              schema:
                type: integer
                format: int32
                minimum: 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                rate_limit_exceeded:
                  value:
                    errorCode: "orders:create_rate_limit_exceeded"
                    message: "Rate limit exceeded"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 429
        '500':
          description: Internal server error. Please try again later.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                server_error:
                  value:
                    errorCode: "orders:create_server_error"
                    message: "Internal server error. Please try again later"
                    debugId: "a8fe597c-193b-4da3-b8b1-195e8ef1603f"
                    httpStatusCode: 500
  /orders/{orderId}:
    parameters:
      - in: path
        name: orderId
        required: true
        schema:
          type: string
          format: uuid
        description: The ID of the order to operate on
    get:
