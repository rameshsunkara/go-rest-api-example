components:
  schemas:
    ApiError:
      type: object
      description: API Error Object.
      required:
        - errorCode
        - message
        - debugId
        - httpStatusCode
      properties:
        httpStatusCode:
          type: integer
          format: int32
          minimum: 400
          maximum: 599
          description: HTTP equivalent status code
        message:
          type: string
          description: User-friendly error message
        debugId:
          type: string
          format: uuid
          description: Unique identifier for the instance of this error
        errorCode:
          type: string
          description: A unique machine-friendly, but human-readable identifier for the error
    Order:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
          description: The unique identifier for the order
        version:
          type: integer
          description: The version of the order
        createdAt:
          type: string
          format: date-time
          description: The date and time when the order was created
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the order was last updated
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          description: The list of products in the order
        user:
          type: string
          description: The user who placed the order
        totalAmount:
          type: number
          format: float64
          description: The total amount of the order
        status:
          type: string
          enum:
            - OrderPending
            - OrderProcessing
            - OrderShipped
            - OrderDelivered
            - OrderCancelled
          description: The status of the order
        updates:
          type: array
          items:
            $ref: '#/components/schemas/OrderUpdate'
          description: The list of updates made to the order
      required:
        - orderId
        - version
        - createdAt
        - products
        - user
        - totalAmount
        - status
    OrderUpdate:
      type: object
      properties:
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the order was updated
        notes:
          type: string
          description: Additional notes or comments about the update
        handledBy:
          type: string
          description: The person or system who handled the update
    Product:
      type: object
      properties:
        name:
          type: string
          description: The name of the product
        updatedAt:
          type: string
          format: date-time
          description: The date and time when the product information was last updated
        price:
          type: number
          format: float64
          description: The price of the product
        status:
          type: string
          description: The status of the product
        remarks:
          type: string
          description: Additional remarks or description about the product
    OrderInput:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductInput'
          description: The list of products in the order
      required:
        - products
    ProductInput:
      type: object
      properties:
        name:
          type: string
          description: The name of the product
        price:
          type: number
          format: float64
          description: The price of the product
        quantity:
          type: number
          format: uint64
          description: No.of items
