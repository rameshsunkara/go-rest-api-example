name: Build

on:
  push:
    branches: [ main, v2 ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Check go mod
        run: |
          go mod tidy
          git diff --exit-code -- go.mod
          git diff --exit-code -- go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v3.7.0
        with:
          version: latest
          skip-build-cache: true
          skip-pkg-cache: true

      - name: Format
        run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then exit 1; fi

      - name: Build
        run: make build

      - name: Test
        run: make test